{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 3rem auto; text-align: center; padding: 3rem 2rem;">
    <div style="font-size: 4rem; color: var(--accent-orange); margin-bottom: 1.5rem; animation: pulseRed 2s infinite; display: inline-block; border-radius: 50%; padding: 1rem;">
        {% if code == 429 %}
            <i class="fa-solid fa-gauge-high"></i>
        {% elif code == 403 %}
            <i class="fa-solid fa-lock"></i>
        {% elif code == 404 %}
            <i class="fa-solid fa-compass"></i>
        {% else %}
            <i class="fa-solid fa-triangle-exclamation"></i>
        {% endif %}
    </div>
    
    <h1 class="page-title" style="font-size: 2.5rem; margin-bottom: 1rem;">Error {{ code }}</h1>
    
    <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem;">
        {{ description }}
    </p>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="{{ url_for('main.home') }}" class="btn-send" style="text-decoration: none; padding: 0.8rem 2rem;">
            <i class="fa-solid fa-house"></i> Back to Home
        </a>
        {% if code == 403 %}
            <a href="{{ url_for('main.report') }}" class="btn-sim" style="text-decoration: none; padding: 0.8rem 2rem;">
                Report an Issue
            </a>
        {% else %}
            <a href="{{ url_for('main.dashboard') }}" class="btn-sim" style="text-decoration: none; padding: 0.8rem 2rem;">
                Crowd Dashboard
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
